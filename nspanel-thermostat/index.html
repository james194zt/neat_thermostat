<!DOCTYPE html>
<html lang="en" data-page="app">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Heating</title>
  </head>
  <body>
    <div class="app" id="app" hidden>
      <header class="top-bar">
        <button class="top-back hidden" id="backToHome" type="button" aria-label="Back to heating">
          ← Heat
        </button>
        <div class="top-left">
          <div class="status-pill">
            <span class="status-dot" id="connectionDot"></span>
            <span id="connectionLabel">Connecting</span>
          </div>
          <div class="weather-block" id="weatherBlock" hidden>
            <div class="weather-main">
              <img class="weather-icon" id="weatherIcon" alt="" width="22" height="22" />
              <span class="weather-temp" id="weatherTemp">--</span>
              <span class="weather-label" id="weatherLabel">--</span>
            </div>
            <div class="weather-sun" id="weatherSun">
              <span class="sun-item">
                <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3 18h18M7 18a5 5 0 0 1 10 0M12 3v4M5 8 6.5 9.5M19 8l-1.5 1.5M8.5 14.5 12 11l3.5 3.5"
                  />
                </svg>
                <span id="sunriseTime">--:--</span>
              </span>
              <span class="sun-item">
                <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3 18h18M7 18a5 5 0 0 1 10 0M12 9V5M5 8 6.5 9.5M19 8l-1.5 1.5M8.5 5.5 12 9l3.5-3.5"
                  />
                </svg>
                <span id="sunsetTime">--:--</span>
              </span>
            </div>
          </div>
        </div>
        <div class="status-pill" id="actionPill">Idle</div>
      </header>

      <div class="banner hidden" id="windowBanner">Window open — heating paused</div>

      <section class="main-stage">
        <section class="hero">
          <div class="hero-label" id="heroLabel">Heating</div>
          <div class="hero-temp" id="currentTemp">--</div>
          <div class="hero-target" id="heroSubtitle">Target --</div>
        </section>

        <section class="temp-controls">
          <button class="temp-btn" id="tempDown" aria-label="Decrease target temperature">−</button>
          <div class="target-display">
            <div class="label">Target</div>
            <div class="value" id="targetTemp">--</div>
          </div>
          <button class="temp-btn" id="tempUp" aria-label="Increase target temperature">+</button>
        </section>

        <section class="mode-row">
          <button class="mode-btn" data-mode="heat">Heat</button>
          <button class="mode-btn" data-mode="off">Off</button>
          <button class="mode-btn" data-preset="eco">Eco</button>
          <button class="mode-btn" data-preset="boost">Boost</button>
        </section>
      </section>

      <div class="status-row hidden" id="statusRow">
        <div class="status-pill hidden" id="summerPill">Summer mode</div>
      </div>

      <section class="info-row">
        <div class="info-card">
          <div class="label">Inside</div>
          <div class="value" id="insideTemp">--</div>
        </div>
        <div class="info-card">
          <div class="label">Outside</div>
          <div class="value" id="outsideTemp">--</div>
        </div>
        <div class="info-card">
          <div class="label">Humidity</div>
          <div class="value" id="insideHumidity">--</div>
        </div>
      </section>

      <section class="bottom-panel">
        <div class="panel-header">
          <div class="panel-title">Rooms</div>
        </div>
        <div class="room-strip" id="roomStrip"></div>
      </section>
    </div>

    <div class="overlay hidden" id="errorOverlay">
      <div class="error-card">
        <h1>Connection failed</h1>
        <p id="errorMessage"></p>
        <button type="button" id="retrySetup">Open setup</button>
      </div>
    </div>

    <div class="overlay hidden" id="deviceOverlay">
      <div class="error-card device-card">
        <h1>Choose this panel</h1>
        <p>Select the device ID configured on your laptop. You only do this once per screen.</p>
        <div class="device-pick-list" id="devicePickList"></div>
        <label for="customDeviceId">Or enter a new device ID</label>
        <input id="customDeviceId" placeholder="hallway" autocomplete="off" />
        <button type="button" id="saveDeviceId">Use this device ID</button>
        <button type="button" class="secondary-link" id="openSetupFromPicker">Open device manager</button>
      </div>
    </div>

    <div class="screensaver hidden" id="screensaver" aria-hidden="true">
      <div class="screensaver-time" data-clock>--:--</div>
      <div class="screensaver-date" data-date></div>
      <div class="screensaver-hint">Wave to wake</div>
    </div>

    <!-- Bust Fully Kiosk / WebView cache: always fetch boot with a unique query. -->
    <script>
      (function () {
        var s = document.createElement("script");
        s.src = "js/cache-boot.js?t=" + Date.now();
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
