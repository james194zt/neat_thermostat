<!DOCTYPE html>
<html lang="en" data-page="setup">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>NSPanel — Choose wall panel</title>
  </head>
  <body class="setup-body">
    <main class="manager picker-manager">
      <header class="manager-header">
        <div>
          <h1>Choose this wall panel</h1>
          <p class="lead">
            Pick which room panel this screen is. All other settings come from
            <strong>Neat Thermostat</strong> in Home Assistant.
          </p>
        </div>
        <a class="secondary header-link" href="index.html">Open thermostat</a>
      </header>

      <section class="setup-section connection-card">
        <h2>Home Assistant</h2>
        <div class="field-grid">
          <div>
            <label for="haUrl">HA URL</label>
            <input id="haUrl" placeholder="http://192.168.0.6:8123" />
          </div>
          <div>
            <label for="accessToken">Long-lived access token</label>
            <input
              id="accessToken"
              type="password"
              placeholder="Required to list wall panels"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="row-actions">
          <button type="button" class="primary" id="connectHa">Connect / refresh panels</button>
          <span class="connection-status" id="connectionStatus">Not connected</span>
        </div>
      </section>

      <section class="setup-section">
        <h2>Wall panels</h2>
        <p class="setup-hint" id="currentPanelHint"></p>
        <ul class="panel-pick-list" id="panelList"></ul>
        <p class="setup-hint">
          Create or edit panels in HA → <strong>Neat Thermostat</strong> → Wall panels.
        </p>
        <div class="setup-status hidden" id="setupStatus"></div>
      </section>
    </main>

    <script>
      (function () {
        var s = document.createElement("script");
        s.src = "js/cache-boot.js?t=" + Date.now();
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
